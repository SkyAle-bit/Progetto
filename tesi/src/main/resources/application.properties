spring.application.name=tesi

# Profilo di default: prod (usa Neon cloud DB)
# Per sviluppo locale con Docker: usa -Dspring.profiles.active=dev
spring.profiles.active=prod

# Disabilita Docker Compose di default (evita errore "No Docker Compose file found")
spring.docker.compose.enabled=false

file.upload-dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Configurazione Email (Resend HTTP API) ──
resend.api.key=${RESEND_API_KEY:your_resend_api_key}
resend.api.from=onboarding@resend.dev
admin.email=koreadministration@gmail.com

jwt.secret=${JWT_SECRET:your_super_secret_jwt_key_here}
jwt.expiration=86400000