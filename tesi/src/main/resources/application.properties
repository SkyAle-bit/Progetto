spring.application.name=tesi

# Profilo di default: prod (usa Neon cloud DB)
# Per sviluppo locale con Docker: usa -Dspring.profiles.active=dev
spring.profiles.active=prod

# Disabilita Docker Compose di default (evita errore "No Docker Compose file found")
spring.docker.compose.enabled=false

file.upload-dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ?? Configurazione Email (SMTP JavaMailSender) ??
mail.from=${MAIL_FROM:koreadministration@gmail.com}
admin.email=koreadministration@gmail.com

# Imposta la chiave usata per JWT tramite variabile d'ambiente JWT_SECRET
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:4200
