spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:tesidb
spring.datasource.username=sa
spring.datasource.password=sa

spring.jpa.hibernate.ddl-auto=create-drop

# JWT Configuration for Tests
jwt.secret=QuestaEunaChiaveSegretaMoltoLungaPerIlMioProgettoTesi12345!
jwt.expiration=86400000

# File Upload Configuration for Tests
file.upload-dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Email Configuration for Tests (mock)
resend.api.key=test-key
resend.api.from=test@test.com
admin.email=admin@test.com

# Disable scheduling in tests
spring.task.scheduling.enabled=false

